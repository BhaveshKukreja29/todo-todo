<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A to-do list about your to-do list. Inspired by meetings about meetings." />
  <title>todo-todo</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #f5f0eb;
  color: #2c2c2c;
}
#navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  background: #fff;
  border-bottom: 1px solid #ddd;
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-left {
  display: flex;
  align-items: center;
}
.nav-title {
  font-size: 18px;
  font-weight: 800;
  color: #2c2c2c;
  letter-spacing: -0.3px;
  text-decoration: none;
  cursor: pointer;
}
.nav-title:hover {
  color: #000;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 14px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 5px;
  color: #555;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  transition: color 0.15s;
}
.nav-link:hover {
  color: #2c2c2c;
}
.nav-link svg {
  opacity: 0.6;
}
.nav-link:hover svg {
  opacity: 1;
}
.nav-login-btn {
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  background: linear-gradient(180deg, #00cc00, #009900);
  color: #fff;
  border: 3px solid #ffff00;
  border-radius: 4px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 2px 2px 0px #999;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
  letter-spacing: 1px;
}
.nav-login-btn:hover {
  background: linear-gradient(180deg, #00ff00, #00cc00);
}
#main-content {
  flex: 1;
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
  padding: 48px 20px 80px;
}
.demotivational-quote {
  text-align: center;
  font-style: italic;
  color: #888;
  font-size: 16px;
  margin-bottom: 40px;
  padding: 0 16px;
  line-height: 1.6;
}
.input-area {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}
.todo-input {
  flex: 1;
  padding: 12px 16px;
  background: #fff;
  border: 1.5px solid #ccc;
  border-radius: 8px;
  color: #2c2c2c;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.todo-input:focus {
  border-color: #888;
}
.todo-input::placeholder {
  color: #aaa;
  font-style: italic;
}
.add-btn {
  padding: 12px 22px;
  background: #d94f3b;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.3px;
}
.add-btn:hover {
  background: #c0392b;
  transform: translateY(-1px);
}
.add-btn:active {
  background: #a93226;
  transform: translateY(0);
}
.add-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}
.todo-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.todo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border: 2px solid #ddd;
  border-radius: 10px;
  padding: 14px 16px;
  transition: border-color 0.1s;
}
.todo-item:hover {
  border-color: #bbb;
}
.todo-text {
  flex: 1;
  font-size: 14px;
  color: #2c2c2c;
  word-break: break-word;
  line-height: 1.4;
}
.tri-btn-group {
  display: flex;
  gap: 3px;
  flex-shrink: 0;
}
.tri-btn {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  border: 2px solid #ccc;
  background: #f8f5f1;
  color: #bbb;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  line-height: 1;
  user-select: none;
}
.tri-btn:hover {
  border-color: #999;
  background: #eee;
}
.tri-btn.cross-active {
  background: #fde8e8;
  border-color: #dc2626;
  color: #dc2626;
}
.tri-btn.half-active {
  background: #fef3cd;
  border-color: #d97706;
  color: #d97706;
}
.tri-btn.tick-active {
  background: #d4edda;
  border-color: #16a34a;
  color: #16a34a;
}
.tri-btn.cooked {
  background: #fef3cd;
  border-color: #b45309;
  color: #b45309;
  font-weight: 800;
}
.delete-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  background: transparent;
  color: #ccc;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  flex-shrink: 0;
}
.delete-btn:hover {
  background: #fde8e8;
  border-color: #dc2626;
  color: #dc2626;
}
#footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: #1a1a1a;
  border-top: 1px solid #ddd;
  background: #fff;
}
.footer-hate {
  cursor: default;
  position: relative;
}
.footer-hate:hover {
  display: inline;
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
}
.modal-card {
  background: #fff;
  border: 2px solid #ddd;
  border-radius: 14px;
  padding: 36px 32px;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
}
.modal-card h2 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 12px;
  color: #2c2c2c;
}
.modal-card p {
  color: #555;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 6px;
}
.modal-warning {
  color: #dc2626 !important;
  font-weight: 700;
  margin-top: 10px;
  margin-bottom: 20px !important;
}
.modal-btn {
  background: #d94f3b;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: background 0.15s;
}
.modal-btn:hover {
  background: #c0392b;
}
.rejection-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 10, 0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9998;
  padding: 20px;
}
.stamp {
  font-family: 'Special Elite', 'Courier New', monospace;
  font-size: 80px;
  font-weight: 900;
  color: #cc0000;
  letter-spacing: 8px;
  transform: rotate(-12deg);
  border: 5px solid #cc0000;
  padding: 8px 40px;
  border-radius: 4px;
  text-shadow:
    1px 1px 0px #880000,
    -1px -1px 0px #880000,
    2px 0px 0px #880000;
  box-shadow:
    inset 0 0 20px rgba(200, 0, 0, 0.15),
    0 0 0 3px rgba(200, 0, 0, 0.1);
  margin-bottom: 25px;
}
.roast-text {
  margin-top: 24px;
  font-size: 17px;
  color: #ccc;
  max-width: 440px;
  text-align: center;
  line-height: 1.5;
  font-style: italic;
}
.chat-icon {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  z-index: 200;
  transition: border-color 0.15s;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.chat-icon:hover {
  border-color: #999;
}
.chat-window {
  position: fixed;
  bottom: 76px;
  right: 20px;
  width: 300px;
  max-height: 380px;
  background: #fff;
  border: 2px solid #ddd;
  border-radius: 12px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
}
.chat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 14px;
  border-bottom: 1px solid #ddd;
  font-weight: 700;
  font-size: 13px;
  color: #2c2c2c;
}
.chat-close {
  background: none;
  border: none;
  color: #999;
  font-size: 14px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}
.chat-close:hover {
  color: #dc2626;
  background: #fde8e8;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 180px;
  background: #faf8f5;
}
.chat-msg {
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.4;
  max-width: 85%;
}
.chat-msg.user {
  background: #e8e4df;
  color: #2c2c2c;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.chat-msg.bot {
  background: #fff;
  color: #444;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  border: 1.5px solid #ddd;
}
.chat-input-area {
  display: flex;
  gap: 6px;
  padding: 10px 12px;
  border-top: 1px solid #ddd;
}
.chat-input {
  flex: 1;
  padding: 8px 10px;
  background: #faf8f5;
  border: 1.5px solid #ccc;
  border-radius: 6px;
  color: #2c2c2c;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none;
}
.chat-input:focus {
  border-color: #888;
}
.chat-input:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.chat-send {
  padding: 8px 12px;
  background: #2c2c2c;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: background 0.15s;
}
.chat-send:hover {
  background: #444;
}
.chat-send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
@media (max-width: 600px) {
  #navbar {
    padding: 10px 14px;
  }
  .nav-title {
    font-size: 16px;
  }
  #main-content {
    padding: 32px 14px 80px;
  }
  .chat-window {
    right: 10px;
    left: 10px;
    width: auto;
  }
  .stamp {
    font-size: 48px;
    padding: 6px 20px;
  }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
  20%, 40%, 60%, 80% { transform: translateX(5px); }
}
.todo-input.shake {
  animation: shake 0.5s ease-in-out;
  border-color: #ef4444 !important;
}
@keyframes stamp-slam {
  0% {
    transform: rotate(-12deg) scale(3);
    opacity: 0;
  }
  35% {
    transform: rotate(-12deg) scale(1);
    opacity: 1;
  }
  45% {
    transform: rotate(-12deg) scale(1.04);
  }
  55% {
    transform: rotate(-12deg) scale(1);
  }
  100% {
    transform: rotate(-12deg) scale(1);
    opacity: 1;
  }
}
.rejection-overlay.active .stamp {
  animation: stamp-slam 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes fade-up {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.rejection-overlay.active .roast-text {
  animation: fade-up 0.4s ease 0.7s forwards;
  opacity: 0;
}
@keyframes slide-in {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.todo-item.entering {
  animation: slide-in 0.2s ease forwards;
}
@keyframes slide-out {
  from {
    opacity: 1;
    transform: translateX(0);
    max-height: 60px;
  }
  to {
    opacity: 0;
    transform: translateX(40px);
    max-height: 0;
    padding: 0 14px;
    margin: 0;
  }
}
.todo-item.removing {
  animation: slide-out 0.25s ease forwards;
  overflow: hidden;
}
@keyframes modal-in {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}
.modal-card {
  animation: modal-in 0.25s ease forwards;
}
@keyframes chat-slide-up {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.chat-window {
  animation: chat-slide-up 0.15s ease forwards;
}
@keyframes wiggle {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(-3deg); }
  50% { transform: rotate(0deg); }
  75% { transform: rotate(3deg); }
  100% { transform: rotate(0deg); }
}
.nav-login-btn {
  animation: wiggle 0.8s ease-in-out infinite;
}
.tri-btn:active {
  transform: scale(0.92);
}
@keyframes cooked-glow {
  0%, 100% { box-shadow: 0 0 4px rgba(217, 119, 6, 0.2); }
  50% { box-shadow: 0 0 10px rgba(217, 119, 6, 0.4); }
}
.tri-btn.cooked {
  animation: cooked-glow 2s ease-in-out infinite;
}
::-webkit-scrollbar {
  width: 5px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #ddd;
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: #bbb;
}
::selection {
  background: rgba(26, 26, 26, 0.1);
  color: #000;
}
</style>

<script>
const CHATBOT_RESPONSES = [
  "Bro just click the button. It's RIGHT there.",
  "I'm a div with an onclick. What do you want from me?",
  "I'll escalate this to nobody.",
  "I can't read.",
  "Have you tried closing this chat and doing literally anything else?",
  "I was trained on a dataset of pure frustration.",
  "Fun fact: this chat doesn't save. The developer forgot to add that in their to-do list",
  "You know there's a whole app behind this chat window, right?",
  "I'd help you, but I genuinely do not want to.",
  "Okay I'm leaving. Don't @ me."
];
const CHATBOT_FINAL = "I'm clocking out. Bye.";
const DEMOTIVATIONAL_QUOTES = [
  "The only thing standing between you and your goals is... this app.",
  "Every task not completed is a task you don't have to worry about.",
  "You miss 100% of the tasks you don't add to your todo-todo list.",
  "Your potential is limitless. Your to-do list, however, is not.",
  "They say the journey of a thousand tasks begins with a single todo-todo.",
  "I love deadlines. I love the whooshing noise they make as they fly by.",
  "The sooner I fall behind, the more time I have to catch up.",
  "Every dead body on Mount Everest was once a highly motivated person.",
  "If it weren't for the last minute, nothing would get done.",
  "Accomplishing the impossible means only that the boss will add it to your regular duties.",
  "Some call it laziness. I call it selective participation.",
  "Procrastination gives you something to look forward to.",
  "I never put off till tomorrow what I can do the day after."
];
const PLACEHOLDERS = [
  "Type a to-do about your to-do...",
  "Go on, add another one you won't do...",
  "This better be meta enough...",
  "I dare you to type 'buy milk'...",
  "Your manager would be so proud of this..."
];
let todos = JSON.parse(localStorage.getItem('todo-todo-items') || '[]');
let chatResponseIndex = 0;
let chatLocked = false;
let placeholderIndex = 0;
const todoInput = document.getElementById('todo-input');
const addBtn = document.getElementById('add-btn');
const todoList = document.getElementById('todo-list');
const quoteEl = document.getElementById('demotivational-quote');
const welcomeModal = document.getElementById('welcome-modal');
const welcomeOkBtn = document.getElementById('welcome-ok-btn');
const rejectionOverlay = document.getElementById('rejection-overlay');
const rejectionRoast = document.getElementById('rejection-roast');
const chatIcon = document.getElementById('chat-icon');
const chatWindow = document.getElementById('chat-window');
const chatClose = document.getElementById('chat-close');
const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');
const chatSend = document.getElementById('chat-send');
function init() {
  if (!localStorage.getItem('todo-todo-welcomed')) {
    welcomeModal.style.display = 'flex';
  }
  quoteEl.textContent = `"${DEMOTIVATIONAL_QUOTES[Math.floor(Math.random() * DEMOTIVATIONAL_QUOTES.length)]}"`;
  renderAllTodos(false);
  startPlaceholderRotation();
  welcomeOkBtn.addEventListener('click', dismissWelcome);
  addBtn.addEventListener('click', handleAdd);
  todoInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !addBtn.disabled) handleAdd();
  });
  chatIcon.addEventListener('click', toggleChat);
  chatClose.addEventListener('click', toggleChat);
  chatSend.addEventListener('click', handleChatSend);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !chatLocked) handleChatSend();
  });
}
function dismissWelcome() {
  welcomeModal.style.display = 'none';
  localStorage.setItem('todo-todo-welcomed', 'true');
  todoInput.focus();
}
function startPlaceholderRotation() {
  setInterval(() => {
    if (!todoInput.value && document.activeElement !== todoInput) {
      placeholderIndex = (placeholderIndex + 1) % PLACEHOLDERS.length;
      todoInput.placeholder = PLACEHOLDERS[placeholderIndex];
    }
  }, 5000);
}
async function handleAdd() {
  const text = todoInput.value.trim();
  if (!text) return;
  addBtn.disabled = true;
  try {
    const result = await classifyTodo(text);
    if (result.approved) {
      const todo = {
        id: Date.now(),
        text: text,
        cross: false,
        half: false,
        tick: false
      };
      todos.push(todo);
      saveTodos();
      appendTodoElement(todo, true); // append single item, animated
      todoInput.value = '';
    } else {
      showRejection(result.roast || "That's an actual task. We don't do those here.");
      todoInput.classList.add('shake');
      setTimeout(() => todoInput.classList.remove('shake'), 500);
    }
  } catch (err) {
    console.error('AI classification failed:', err);
    const todo = {
      id: Date.now(),
      text: text,
      cross: false,
      half: false,
      tick: false
    };
    todos.push(todo);
    saveTodos();
    appendTodoElement(todo, true);
    todoInput.value = '';
  }
  addBtn.disabled = false;
  todoInput.focus();
}
async function classifyTodo(text) {
  try {
    const response = await fetch('/api/classify', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ text })
    });
    
    if (!response.ok) {
      if (response.status === 500) {
        // Vercel serverless function might return 500 if API key is missing
        return naiveClassify(text);
      }
      throw new Error(`API error: ${response.status}`);
    }

    const data = await response.json();
    const content = data.choices[0].message.content.trim();
    try {
      const parsed = JSON.parse(content);
      return { approved: parsed.approved, roast: parsed.roast };
    } catch {
      const lower = content.toLowerCase();
      if (lower.includes('rejected') || lower.includes('"approved": false') || lower.includes('"approved":false')) {
        return { approved: false, roast: content };
      }
      return { approved: true, roast: '' };
    }
  } catch (e) {
    // Fallback if fetch fails entirely (e.g. running locally without Vercel CLI)
    return naiveClassify(text);
  }
}
function naiveClassify(text) {
  const lower = text.toLowerCase();
  const metaKeywords = [
    'todo', 'to-do', 'to do', 'task', 'list', 'add', 'mark', 'complete',
    'delete', 'remove', 'check', 'uncheck', 'organize', 'sort', 'prioritize',
    'open', 'close', 'app', 'done', 'finish task', 'clear', 'archive'
  ];
  const isMeta = metaKeywords.some(kw => lower.includes(kw));
  if (isMeta) {
    return { approved: true, roast: '' };
  }
  return {
    approved: false,
    roast: "That sounds like an actual task. This is todo-todo. We only do to-dos about to-dos."
  };
}
function showRejection(roast) {
  rejectionRoast.textContent = roast;
  rejectionOverlay.style.display = 'flex';
  rejectionOverlay.classList.remove('active');
  void rejectionOverlay.offsetWidth;
  rejectionOverlay.classList.add('active');
  const dismiss = () => {
    rejectionOverlay.style.display = 'none';
    rejectionOverlay.classList.remove('active');
    rejectionOverlay.removeEventListener('click', dismiss);
  };
  rejectionOverlay.addEventListener('click', dismiss);
  setTimeout(dismiss, 3500);
}
function renderAllTodos(animate) {
  todoList.innerHTML = '';
  todos.forEach((todo) => {
    appendTodoElement(todo, animate);
  });
}
function appendTodoElement(todo, animate) {
  const li = createTodoElement(todo);
  if (animate) {
    li.classList.add('entering');
    li.addEventListener('animationend', () => li.classList.remove('entering'), { once: true });
  }
  todoList.appendChild(li);
}
function createTodoElement(todo) {
  const li = document.createElement('li');
  li.className = 'todo-item';
  li.dataset.id = todo.id;
  const isCooked = todo.half && todo.tick;
  const crossBtn = document.createElement('button');
  crossBtn.className = 'tri-btn';
  applyCrossState(crossBtn, todo, isCooked);
  crossBtn.addEventListener('click', () => {
    todo.cross = !todo.cross;
    saveTodos();
    updateTriStateButtons(li, todo);
  });
  const halfBtn = document.createElement('button');
  halfBtn.className = 'tri-btn';
  applyHalfState(halfBtn, todo);
  halfBtn.addEventListener('click', () => {
    todo.half = !todo.half;
    saveTodos();
    updateTriStateButtons(li, todo);
  });
  const tickBtn = document.createElement('button');
  tickBtn.className = 'tri-btn';
  applyTickState(tickBtn, todo);
  tickBtn.addEventListener('click', () => {
    todo.tick = !todo.tick;
    saveTodos();
    updateTriStateButtons(li, todo);
  });
  const textSpan = document.createElement('span');
  textSpan.className = 'todo-text';
  textSpan.textContent = todo.text;
  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'delete-btn';
  deleteBtn.textContent = '🗑';
  deleteBtn.title = 'Delete';
  deleteBtn.addEventListener('click', () => deleteTodo(todo.id, li));
  li.appendChild(crossBtn);
  li.appendChild(halfBtn);
  li.appendChild(tickBtn);
  li.appendChild(textSpan);
  li.appendChild(deleteBtn);
  return li;
}
function updateTriStateButtons(li, todo) {
  const buttons = li.querySelectorAll('.tri-btn');
  const crossBtn = buttons[0];
  const halfBtn = buttons[1];
  const tickBtn = buttons[2];
  const isCooked = todo.half && todo.tick;
  crossBtn.className = 'tri-btn';
  halfBtn.className = 'tri-btn';
  tickBtn.className = 'tri-btn';
  applyCrossState(crossBtn, todo, isCooked);
  applyHalfState(halfBtn, todo);
  applyTickState(tickBtn, todo);
}
function applyCrossState(btn, todo, isCooked) {
  if (isCooked) {
    if (todo.cross) {
      btn.classList.add('cooked');
      btn.textContent = '½';
      btn.title = 'You cooked.';
    } else {
      btn.textContent = '½';
      btn.title = 'Click for legendary status';
    }
  } else {
    if (todo.cross) {
      btn.classList.add('cross-active');
    }
    btn.textContent = '✗';
  }
}
function applyHalfState(btn, todo) {
  if (todo.half) {
    btn.classList.add('half-active');
  }
  btn.textContent = '½';
}
function applyTickState(btn, todo) {
  if (todo.tick) {
    btn.classList.add('tick-active');
  }
  btn.textContent = '✓';
}
function deleteTodo(id, element) {
  element.classList.add('removing');
  setTimeout(() => {
    element.remove();
    todos = todos.filter(t => t.id !== id);
    saveTodos();
  }, 250);
}
function saveTodos() {
  localStorage.setItem('todo-todo-items', JSON.stringify(todos));
}
function toggleChat() {
  const isVisible = chatWindow.style.display !== 'none';
  chatWindow.style.display = isVisible ? 'none' : 'flex';
  if (!isVisible) {
    chatInput.focus();
  }
}
function handleChatSend() {
  const text = chatInput.value.trim();
  if (!text || chatLocked) return;
  appendChatMsg(text, 'user');
  chatInput.value = '';
  setTimeout(() => {
    if (chatResponseIndex < CHATBOT_RESPONSES.length) {
      appendChatMsg(CHATBOT_RESPONSES[chatResponseIndex], 'bot');
      chatResponseIndex++;
    }
    if (chatResponseIndex >= CHATBOT_RESPONSES.length && !chatLocked) {
      chatLocked = true;
      setTimeout(() => {
        appendChatMsg(CHATBOT_FINAL, 'bot');
        chatInput.disabled = true;
        chatSend.disabled = true;
        chatInput.placeholder = 'Chat closed permanently.';
      }, 800);
    }
  }, 500 + Math.random() * 500);
}
function appendChatMsg(text, sender) {
  const msg = document.createElement('div');
  msg.className = `chat-msg ${sender}`;
  msg.textContent = text;
  chatMessages.appendChild(msg);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
init();
</script>
